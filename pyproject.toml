[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
# Enable Pyflakes, pycodestyle, and isort rules.
select = ["E", "F", "I"]

# Set a line length of 88, which is the standard for Black.
line-length = 88

[tool.ruff.format]
# Enable formatting.
quote-style = "double"
indent-style = "space"

[tool.isort]
profile = "black"
line_length = 88
