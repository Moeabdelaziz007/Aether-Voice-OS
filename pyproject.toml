[tool.pytest.ini_options]
testpaths = ["tests"]

norecursedirs = ["apps/portal", "node_modules", "venv", ".venv", "target"]

[tool.ruff]
line-length = 88
extend-exclude = ["*.bak", "*.coverage", "docs/assets/*"]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.format]
# Enable formatting.
quote-style = "double"
indent-style = "space"

[tool.isort]
profile = "black"
line_length = 88
