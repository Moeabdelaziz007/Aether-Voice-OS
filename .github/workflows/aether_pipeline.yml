# ═══════════════════════════════════════════════════════════════════
# 🧬 Aether Voice OS — Unified CI Pipeline
# ═══════════════════════════════════════════════════════════════════

name: "🧪 Aether CI"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Stage 0: Rust Signal Layer (Cortex)
  # ─────────────────────────────────────────────────────────────────
  rust-check:
    name: "🦀 Rust: Cortex"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run cargo check
        run: cd cortex && cargo check

  # ─────────────────────────────────────────────────────────────────
  # Stage 1: Code Quality (Lint)
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: "🔍 Lint & Style"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff check
        run: ruff check core/engine.py core/audio/capture.py core/audio/jitter_buffer.py core/ai/adk_agents.py core/infra/telemetry.py core/services/registry.py core/tools/router.py core/tools/system_tool.py tests/test_system_tool.py tests/integration/test_gateway_e2e.py

      - name: Run ruff format check
        run: ruff format --check core/engine.py core/audio/capture.py core/audio/jitter_buffer.py core/ai/adk_agents.py core/infra/telemetry.py core/services/registry.py core/tools/router.py core/tools/system_tool.py tests/test_system_tool.py tests/integration/test_gateway_e2e.py

      - name: Run Python syntax check
        run: python -m compileall core/engine.py core/ai/adk_agents.py core/ai/session core/audio/capture.py core/audio/jitter_buffer.py core/audio/playback.py core/infra/telemetry.py core/infra/transport/gateway.py core/tools/router.py core/tools/system_tool.py tests/test_system_tool.py tests/integration/test_gateway_e2e.py

      - name: File size guard (warn on new files > 400 LOC)
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "null" ]; then
            BASE_SHA="HEAD~1"
          fi

          mapfile -t NEW_FILES < <(git diff --name-only --diff-filter=A "$BASE_SHA"...HEAD)
          if [ ${#NEW_FILES[@]} -eq 0 ]; then
            echo "No new files in diff."
            exit 0
          fi

          for file in "${NEW_FILES[@]}"; do
            [ -f "$file" ] || continue
            lines=$(wc -l < "$file")
            if [ "$lines" -gt 400 ]; then
              echo "::warning file=$file::New file is $lines LOC (>400). Consider splitting this module."
            fi
          done

  # ─────────────────────────────────────────────────────────────────
  # Stage 2: Comprehensive Testing
  # ─────────────────────────────────────────────────────────────────
  test:
    name: "🧪 Test (Python ${{ matrix.python-version }})"
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 portaudio19-dev build-essential

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/test_system_tool.py tests/integration/test_gateway_e2e.py -q --maxfail=1 --disable-warnings --cov=core.tools.system_tool --cov=core.infra.transport.gateway --cov=core.infra.transport.session_state --cov-report=xml --cov-report=term-missing --cov-fail-under=35
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Verify Core Imports
        run: |
          python -c "from core.infra.event_bus import EventBus; print('✅ EventBus OK')"
          python -c "from core.infra.telemetry import get_tracer; print('✅ Telemetry OK')"
          python -c "from core.engine import AetherEngine; print('✅ Engine OK')"

  # ─────────────────────────────────────────────────────────────────
  # Stage 3: Portal (Next.js)
  # ─────────────────────────────────────────────────────────────────
  portal-check:
    name: "🌐 Portal: HUD"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/portal/package-lock.json"
      - name: Install dependencies
        run: cd apps/portal && npm ci
      - name: Run lint
        run: cd apps/portal && npm run lint
      - name: Run tests
        run: cd apps/portal && npm run test

  # ─────────────────────────────────────────────────────────────────
  # Stage 4: Security & Docker
  # ─────────────────────────────────────────────────────────────────
  security-and-build:
    name: "🛡️ Security & 🐳 Docker"
    needs: [test, portal-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Security Tools
        run: pip install bandit safety

      - name: Run Bandit (SAST)
        run: bandit -r core/ || echo "Bandit found potential issues."

      - name: Run Safety Check
        run: safety check -r requirements.txt || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Check)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: aether-os:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
