# ═══════════════════════════════════════════════════════════════════
# 🧬 Aether Voice OS — Unified CI Pipeline
# ═══════════════════════════════════════════════════════════════════

name: "🧪 Aether CI"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Stage 1: Code Quality (Lint)
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: "🔍 Lint & Style"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff pre-commit

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  # ─────────────────────────────────────────────────────────────────
  # Stage 2: Comprehensive Testing
  # ─────────────────────────────────────────────────────────────────
  test:
    name: "🧪 Test (Python ${{ matrix.python-version }})"
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev build-essential

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=core --cov-report=xml --cov-report=term-missing --cov-fail-under=60
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # ─────────────────────────────────────────────────────────────────
  # Stage 3: Security & Docker
  # ─────────────────────────────────────────────────────────────────
  security-and-build:
    name: "🛡️ Security & 🐳 Docker"
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Security Tools
        run: pip install bandit safety

      - name: Run Bandit (SAST)
        run: bandit -r core/ || echo "Bandit found potential issues."

      - name: Run Safety Check
        run: safety check -r requirements.txt || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Check)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: aether-os:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
