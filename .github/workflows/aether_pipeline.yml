# ═══════════════════════════════════════════════════════════════════
# 🧬 Aether Voice OS — Unified CI Pipeline
# ═══════════════════════════════════════════════════════════════════

name: "🧪 Aether CI"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Stage 0: Rust Signal Layer (Cortex)
  # ─────────────────────────────────────────────────────────────────
  rust-check:
    name: "🦀 Rust: Cortex"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run cargo check
        run: cd cortex && cargo check

  # ─────────────────────────────────────────────────────────────────
  # Stage 1: Code Quality (Lint)
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: "🔍 Lint & Style"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff check
        run: ruff check core/ tests/
      - name: Run ruff format check
        run: ruff format --check core/ tests/
      - name: Run Python syntax check
        run: python -m compileall core/ tests/

  # ─────────────────────────────────────────────────────────────────
  # Stage 2: Comprehensive Testing
  # ─────────────────────────────────────────────────────────────────
  test:
    name: "🧪 Test (Python ${{ matrix.python-version }})"
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 portaudio19-dev build-essential

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -q --maxfail=5 --disable-warnings --cov=core --cov-report=xml --cov-report=term-missing --cov-fail-under=40
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Verify Core Imports
        run: |
          python -c "from core.infra.event_bus import EventBus; print('✅ EventBus OK')"
          python -c "from core.infra.telemetry import get_tracer; print('✅ Telemetry OK')"
          python -c "from core.engine import AetherEngine; print('✅ Engine OK')"

  # ─────────────────────────────────────────────────────────────────
  # Stage 3: Portal (Next.js)
  # ─────────────────────────────────────────────────────────────────
  portal-check:
    name: "🌐 Portal: HUD"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/portal/package-lock.json"
      - name: Install dependencies
        run: cd apps/portal && npm ci
      - name: Run lint
        run: cd apps/portal && npm run lint
      - name: Run tests
        run: cd apps/portal && npm run test

  # ─────────────────────────────────────────────────────────────────
  # Stage 4: Security & Docker
  # ─────────────────────────────────────────────────────────────────
  security-and-build:
    name: "🛡️ Security & 🐳 Docker"
    needs: [test, portal-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Security Tools
        run: pip install bandit safety

      - name: Run Bandit (SAST)
        run: bandit -r core/ || echo "Bandit found potential issues."

      - name: Run Safety Check
        run: safety check -r requirements.txt || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Check)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: aether-os:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
