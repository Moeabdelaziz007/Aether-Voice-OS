# AetherOS - Automated Firebase Deployment
# Triggers on every push to main branch
# Builds Next.js portal -> Deploys to Firebase Hosting

name: "🔥 Firebase Deploy"

on:
  push:
    branches: [main]
    paths:
      - 'apps/portal/**'
      - 'firebase.json'
      - '.firebaserc'
      - 'firestore.rules'
      - 'firestore.indexes.json'
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: read
  deployments: write

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Stage 1: Build & Test
  # ─────────────────────────────────────────────────────────────────
  build_and_test:
    name: "🔨 Build & Verify"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/portal/package-lock.json'

      - name: Install Dependencies
        run: |
          cd apps/portal
          npm ci --legacy-peer-deps

      - name: Type Check
        run: |
          cd apps/portal
          npx tsc --noEmit

      - name: Build Next.js Portal
        run: |
          cd apps/portal
          npm run build
        env:
          NEXT_PUBLIC_GEMINI_KEY: ${{ secrets.NEXT_PUBLIC_GEMINI_KEY }}
          NEXT_PUBLIC_AETHER_GATEWAY_URL: ${{ secrets.NEXT_PUBLIC_AETHER_GATEWAY_URL }}

      - name: Verify Build Output
        run: |
          echo "📦 Checking build output..."
          ls -la apps/portal/out/
          test -f apps/portal/out/index.html && echo "✅ index.html exists"
          test -d apps/portal/out/_next && echo "✅ _next directory exists"
          
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portal-build
          path: apps/portal/out/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────
  # Stage 2: Firebase Deploy
  # ─────────────────────────────────────────────────────────────────
  deploy_to_firebase:
    name: "🚀 Deploy to Firebase"
    needs: build_and_test
    runs-on: ubuntu-latest
    environment: 
      name: production
      url: ${{ steps.deploy.outputs.firebase_url }}
    
    outputs:
      firebase_url: ${{ steps.deploy.outputs.firebase_url }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: portal-build
          path: apps/portal/out/

      - name: Setup Node.js (for Firebase CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        id: deploy
        run: |
          echo "🔥 Deploying to Firebase Hosting..."
          
          # Deploy hosting only (skip Firestore rules/indexes for speed)
          firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" \
            --project "notional-armor-456623-e8"
          
          # Extract deployment URL
          DEPLOY_URL=$(firebase hosting:channel:list --json | jq -r '.[0].url' || echo "https://notional-armor-456623-e8.web.app")
          echo "firebase_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          
          echo ""
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║  ✅ DEPLOYMENT SUCCESSFUL                              ║"
          echo "╠════════════════════════════════════════════════════════╣"
          echo "║  Project: notional-armor-456623-e8                     ║"
          echo "║  URL: $DEPLOY_URL"
          echo "║  Commit: ${GITHUB_SHA::8}                              ║"
          echo "╚════════════════════════════════════════════════════════╝"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Create Deployment Status
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = '${{ job.status }}';
            const description = status === 'success' 
              ? '✅ Deployed to Firebase Hosting' 
              : '❌ Deployment failed';
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment?.id || 1,
              state: status === 'success' ? 'success' : 'failure',
              description: description,
              environment_url: '${{ steps.deploy.outputs.firebase_url }}',
              auto_inactive: true,
              log_url: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });

  # ─────────────────────────────────────────────────────────────────
  # Stage 3: Post-Deployment Validation
  # ─────────────────────────────────────────────────────────────────
  validate_deployment:
    name: "🔍 Validate Deployment"
    needs: deploy_to_firebase
    runs-on: ubuntu-latest
    
    steps:
      - name: Wait for Firebase Propagation
        run: sleep 10

      - name: Check Deployment Health
        run: |
          DEPLOY_URL="${{ needs.deploy_to_firebase.outputs.firebase_url }}"
          echo "🔍 Validating: $DEPLOY_URL"
          
          # Check main page loads
          HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" "$DEPLOY_URL")
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Main page: HTTP $HTTP_CODE"
          else
            echo "❌ Main page failed: HTTP $HTTP_CODE"
            exit 1
          fi
          
          # Check critical assets
          curl -o /dev/null -s -w "%{http_code}" "$DEPLOY_URL/favicon.png" | grep -q "200" && echo "✅ Favicon OK"
          curl -o /dev/null -s -w "%{http_code}" "$DEPLOY_URL/index.html" | grep -q "200" && echo "✅ index.html OK"
          
          echo ""
          echo "🎉 All validation checks passed!"

      - name: Performance Check (Lighthouse CI)
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ needs.deploy_to_firebase.outputs.firebase_url }}
            ${{ needs.deploy_to_firebase.outputs.firebase_url }}/live
            ${{ needs.deploy_to_firebase.outputs.firebase_url }}/admin
          uploadArtifacts: true
          budgetPath: ./apps/portal/.lighthouseci/budget.json

  # ─────────────────────────────────────────────────────────────────
  # Stage 4: Notifications
  # ─────────────────────────────────────────────────────────────────
  notify:
    name: "📢 Send Notification"
    needs: [deploy_to_firebase, validate_deployment]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Send Discord Notification
        uses: Ilshidur/action-discord@master
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            {{ EVENT_PAYLOAD.head_commit.message }}
            **Status:** ${{ needs.deploy_to_firebase.result == 'success' && '✅ Success' || '❌ Failed' }}
            **Commit:** ${{ github.sha }}
            **Author:** ${{ github.actor }}
            **URL:** ${{ needs.deploy_to_firebase.outputs.firebase_url }}
            **Workflow:** [View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
