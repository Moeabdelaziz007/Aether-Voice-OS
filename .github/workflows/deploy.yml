# ═══════════════════════════════════════════════════════════
# AetherOS — Auto Deploy to Firebase Hosting
# Triggered on every push to main branch
# ═══════════════════════════════════════════════════════════
name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - 'apps/portal/**'
      - 'firebase.json'
      - '.github/workflows/deploy.yml'

  workflow_dispatch: # Allow manual triggers

jobs:
  build-and-deploy:
    name: Build & Deploy Portal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/portal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          NEXT_PUBLIC_AETHER_GATEWAY_URL: ${{ secrets.AETHER_GATEWAY_URL }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

  notify:
    name: Deployment Notification
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Log result
        run: |
          if [ "${{ needs.build-and-deploy.result }}" = "success" ]; then
            echo "✅ AetherOS Portal deployed successfully to Firebase Hosting"
          else
            echo "❌ AetherOS Portal deployment failed"
          fi
