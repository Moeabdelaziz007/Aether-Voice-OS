name: Aether Voice OS CI

on:
  push:
    branches: [ main, feat/* ]
  pull_request:
    branches: [ main ]

jobs:
  test_and_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y portaudio19-dev
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-mock ruff
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
          ruff check core/ai/session/facade.py core/ai/generative_init.py core/infra/transport/gateway.py tests/test_gemini_session.py
          ruff format --check core/ai/session/facade.py core/ai/generative_init.py core/infra/transport/gateway.py tests/test_gemini_session.py

      - name: Run Pytest
        run: |
          pytest tests/test_gemini_session.py -v

  build_docker:
    needs: test_and_lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t aether-voice-os-backend .
