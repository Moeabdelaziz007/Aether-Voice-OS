name: "🧠 Update Memories"

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-memories:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to compare arbitrary commits

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install google-genai

      - name: Generate Summary and Update memories.md
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          COMMIT_SHA=${{ github.sha }}
          BEFORE_SHA=${{ github.event.before }}

          # Handle the case where the branch is newly created and before is empty/0000...
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            git show $COMMIT_SHA > push_diff.txt
          else
            git diff $BEFORE_SHA $COMMIT_SHA > push_diff.txt
          fi

          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          COMMIT_DATE=$(git log -1 --pretty=format:"%ad" --date=short)

          # Generate a real analysis/summary of the diff using Gemini
          echo "Generating summary..."
          python .github/scripts/generate_memory_summary.py push_diff.txt > summary.md

          # Construct the new memory entry safely
          # Using heredoc to avoid string formatting issues with echo -e
          cat << EOT > new_entry.md
### Update [${COMMIT_DATE}] - Push to Main (${COMMIT_SHA:0:7})

**Author:** ${COMMIT_AUTHOR}
**Message:** ${COMMIT_MSG}

**Analysis/Summary of Changes:**
$(cat summary.md)

---

EOT

          # Ensure .idx directory exists
          mkdir -p .idx

          # If memories.md doesn't exist, create it with header
          if [ ! -f .idx/memories.md ]; then
            echo "# AetherOS Memories Index" > .idx/memories.md
            echo "" >> .idx/memories.md
          fi

          # Prepend the new entry to memories.md AFTER the header.
          # We'll split the file into header and content, insert the new entry, and recombine.
          # The header is defined as the first line starting with "# AetherOS Memories Index" and the blank line following it.

          if head -n 1 .idx/memories.md | grep -q "^# AetherOS Memories Index"; then
            # Extract header (first 2 lines)
            head -n 2 .idx/memories.md > temp_memories.md
            # Append new entry
            cat new_entry.md >> temp_memories.md
            # Append the rest of the original file (from line 3 onwards)
            tail -n +3 .idx/memories.md >> temp_memories.md
            mv temp_memories.md .idx/memories.md
          else
            # No matching header, prepend at the very top
            cat new_entry.md .idx/memories.md > temp_memories.md
            mv temp_memories.md .idx/memories.md
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .idx/memories.md
          # Only commit if there are changes
          git diff --staged --quiet || (git commit -m "🧠 Auto-update memories.md [skip ci]" && git push)
