name: 🔄 Update README Statistics

on:
  schedule:
    # Runs every 24 hours at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual trigger

jobs:
  update-readme-stats:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 📊 Generate GitHub Readme Stats
        uses: anuraghazra/github-readme-stats@master
        with:
          username: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
      
      - name: 🔄 Update contribution streak
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          user: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
      
      - name: 📈 Update visitor counter
        run: |
          echo "Visitor counter will be updated automatically via external service"
      
      - name: 💾 Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "📊 Auto-update README statistics [skip ci]" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-contributors:
    runs-on: ubuntu-latest
    needs: update-readme-stats
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 👥 Update contributors Widget
        uses: akhilmhdh/contributors-readme-action@v2.3.10
        with:
          image_size: 80
          columns_per_row: 10
          commit_message: "👥 Auto-update contributors [skip ci]"
          committer_username: github-actions[bot]
          committer_email: github-actions[bot]@users.noreply.github.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
